<style>
    /* 1. Variables Globales */
    :root {
        --primary-orange: #f43f07;
        --corporate-gradient: linear-gradient(90deg, #f43f07 0%, #a07aff 50%, #004a99 100%);
        --font-heading: 'Zen Dots', sans-serif;
        --font-body: 'Outfit', sans-serif;
        --surface-color: #0f0f0f;
    }

    /* 2. El Gradiente del Hero y Títulos */
    .text-gradient {
        background: var(--corporate-gradient);
        -webkit-background-clip: text !important;
        background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        display: inline-block;
    }

    /* =========================================
       TARJETAS DE SERVICIOS (Html Prototype Parity)
       ========================================= */
    .services-grid-ele {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2.5rem;
        padding: 0 2rem;
    }
    
    @media (max-width: 992px) {
        .services-grid-ele { grid-template-columns: repeat(2, 1fr); gap: 2rem; }
    }
    
    @media (max-width: 768px) {
        .services-grid-ele { grid-template-columns: 1fr; padding: 0 1.5rem; }
    }

    .service-card {
        position: relative;
        background: var(--surface-color);
        padding: 2px;
        border-radius: 32px;
        overflow: hidden;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        height: 100%;
    }

    .service-card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: var(--corporate-gradient);
        opacity: 0.3;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .service-card:hover::before {
        opacity: 1;
        animation: border-rotate 4s linear infinite;
    }

    .service-inner {
        background: var(--surface-color);
        border-radius: 30px;
        height: 100%;
        overflow: hidden;
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
    }

    .service-visual { 
        height: 280px; 
        background-size: cover; 
        background-position: center; 
        position: relative; 
    }
    
    .service-body { 
        padding: 3rem; 
        flex-grow: 1;
    }

    .service-body h3 {
        margin-top: 0;
        font-family: var(--font-heading);
        font-size: 1.2rem;
        color: white;
    }

    .service-body p {
        color: #a0a0a0;
        font-family: var(--font-body);
        margin-bottom: 0;
    }

    @keyframes border-rotate {
        0% { filter: hue-rotate(0deg); }
        100% { filter: hue-rotate(360deg); }
    }

    /* =========================================
       METRICAS
       ========================================= */
    .metric-card {
        background: transparent;
        padding: 2rem;
        text-align: center;
    }

    .metric-card h3 {
        font-size: 3.5rem;
        margin-bottom: 0;
        font-family: var(--font-heading);
    }

    .metric-card p {
        color: white;
        margin-top: 0;
        font-size: 1.1rem;
    }

    /* =========================================
       ALIADOS (Carrusel Infinito)
       ========================================= */
    .aliados-marquee-wrapper {
        overflow: hidden;
        padding: 60px 0;
        background: #080808;
        width: 100vw;
        margin-left: calc(-50vw + 50%);
    }

    .marquee-content {
        display: inline-flex;
        gap: 8rem;
        animation: scroll-marq 40s linear infinite;
        align-items: center;
    }

    .marquee-content:hover {
        animation-play-state: paused;
    }

    .marquee-content img {
        height: 45px;
        width: auto;
        filter: brightness(0) invert(1) opacity(0.5);
        transition: all 0.4s ease;
    }

    .marquee-content img:hover {
        filter: none;
        opacity: 1;
        transform: scale(1.15);
    }

    @keyframes scroll-marq {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }

    /* Formulario Centrado */
    .form-centered-wrapper {
        background: #0f0f0f;
        border-radius: 40px;
        padding: 4rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-width: 800px;
        margin: 0 auto;
    }
    
    @media (max-width: 768px) {
        .form-centered-wrapper { padding: 2rem 1.5rem; }
    }

    /* =========================================
       FIX RESPONSIVO: HERO TITLE
       ========================================= */
    #hero_section_ing .elementor-heading-title {
        font-size: clamp(2.5rem, 8vw, 4.5rem) !important;
        word-wrap: normal !important;
        hyphens: none !important;
        white-space: normal !important;
    }

    @media (max-width: 768px) {
        #hero_section_ing .elementor-heading-title {
            font-size: 2.8rem !important;
            word-break: normal !important;
        }
    }

    /* =========================================
       ESTILOS PREMIUM PARA WPFORMS (INGEDACA)
       ========================================= */
    div.wpforms-container-full .wpforms-form .wpforms-field input,
    div.wpforms-container-full .wpforms-form .wpforms-field select,
    div.wpforms-container-full .wpforms-form .wpforms-field textarea {
        width: 100% !important;
        padding: 1.2rem 1.5rem !important;
        margin-bottom: 0.5rem !important;
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 12px !important;
        color: white !important;
        font-family: var(--font-body) !important;
        font-size: 1rem !important;
        transition: all 0.3s ease !important;
        box-sizing: border-box !important;
    }

    div.wpforms-container-full .wpforms-form .wpforms-field select {
        appearance: none;
        -webkit-appearance: none;
        height: auto !important;
    }

    div.wpforms-container-full .wpforms-form .wpforms-field select option {
        background-color: #0f0f0f;
        color: white;
    }

    div.wpforms-container-full .wpforms-form .wpforms-submit-container {
        display: block !important;
        margin-top: 2rem !important;
    }

    div.wpforms-container-full .wpforms-form .wpforms-submit-container button[type="submit"],
    div.wpforms-container-full .wpforms-form .wpforms-submit-container input[type="submit"] {
        width: 100% !important;
        padding: 1.2rem 2rem !important;
        background-color: var(--primary-orange) !important;
        color: white !important;
        border: none !important;
        border-radius: 50px !important;
        font-family: var(--font-heading) !important;
        font-size: 1rem !important;
        text-transform: uppercase !important;
        cursor: pointer !important;
        transition: all 0.3s ease !important;
        display: block !important;
    }

    div.wpforms-container-full .wpforms-form .wpforms-submit-container button[type="submit"]:hover,
    div.wpforms-container-full .wpforms-form .wpforms-submit-container input[type="submit"]:hover {
        background-color: #d13504 !important;
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(244, 63, 7, 0.3) !important;
    }

    div.wpforms-container-full .wpforms-form .wpforms-field-label {
        display: none !important;
    }
</style>
